<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#f43f5e"/>
      <stop offset="25%"  style="stop-color:#f59e0b"/>
      <stop offset="50%"  style="stop-color:#22c55e"/>
      <stop offset="75%"  style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <clipPath id="roundRect">
      <rect width="512" height="512" rx="112.64" ry="112.64"/>
    </clipPath>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="112.64" ry="112.64" fill="url(#bg)"/>
  <!-- 相机机身 -->
  <rect x="115.19999999999999" y="133.12" width="281.6" height="204.8"
        rx="25.6" ry="25.6"
        fill="none" stroke="white" stroke-width="20.48" stroke-linejoin="round"/>
  <!-- 镜头圆 -->
  <circle cx="256" cy="240.64000000000001" r="66.56"
          fill="none" stroke="white" stroke-width="20.48"/>
  <!-- 取景器小方块 -->
  <rect x="151.04" y="99.84" 
        width="76.8" height="35.84"
        rx="10.24" ry="10.24" fill="white" opacity="0.9"/>
  <!-- 彩色调色光谱条 -->
  <rect x="89.6" y="368.64" width="332.8" height="35.84"
        rx="17.92" ry="17.92" fill="url(#spectrum)"/>
</svg>