<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#f43f5e"/>
      <stop offset="25%"  style="stop-color:#f59e0b"/>
      <stop offset="50%"  style="stop-color:#22c55e"/>
      <stop offset="75%"  style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <clipPath id="roundRect">
      <rect width="96" height="96" rx="21.12" ry="21.12"/>
    </clipPath>
  </defs>
  <!-- 背景 -->
  <rect width="96" height="96" rx="21.12" ry="21.12" fill="url(#bg)"/>
  <!-- 相机机身 -->
  <rect x="21.599999999999998" y="24.959999999999997" width="52.800000000000004" height="38.400000000000006"
        rx="4.800000000000001" ry="4.800000000000001"
        fill="none" stroke="white" stroke-width="3.84" stroke-linejoin="round"/>
  <!-- 镜头圆 -->
  <circle cx="48" cy="45.12" r="12.48"
          fill="none" stroke="white" stroke-width="3.84"/>
  <!-- 取景器小方块 -->
  <rect x="28.32" y="18.72" 
        width="14.399999999999999" height="6.720000000000001"
        rx="1.92" ry="1.92" fill="white" opacity="0.9"/>
  <!-- 彩色调色光谱条 -->
  <rect x="16.799999999999997" y="69.12" width="62.400000000000006" height="6.720000000000001"
        rx="3.3600000000000003" ry="3.3600000000000003" fill="url(#spectrum)"/>
</svg>