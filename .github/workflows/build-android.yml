name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. 安装 npm 依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建 Web 产物
      - name: Build web assets
        run: npm run build

      # 5. 设置 JDK 17
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 6. 诊断：打印 Android SDK 环境信息
      - name: Diagnose Android SDK environment
        run: |
          echo "=== ANDROID_HOME: $ANDROID_HOME ==="
          echo "=== ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT ==="
          echo "=== Available platforms: ==="
          ls "$ANDROID_HOME/platforms" 2>/dev/null || echo "No platforms dir"
          echo "=== Available build-tools: ==="
          ls "$ANDROID_HOME/build-tools" 2>/dev/null || echo "No build-tools dir"
          echo "=== Existing license files: ==="
          ls -la "$ANDROID_HOME/licenses" 2>/dev/null || echo "No licenses dir"
          echo "=== android-sdk-license content: ==="
          cat "$ANDROID_HOME/licenses/android-sdk-license" 2>/dev/null || echo "File not found"
          echo "=== cmdline-tools: ==="
          ls "$ANDROID_HOME/cmdline-tools" 2>/dev/null || echo "No cmdline-tools"

      # 7. 接受 Android SDK 许可证（覆盖写入所有许可证文件）
      - name: Accept Android SDK licenses
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          echo "Using sdkmanager: $SDKMANAGER"

          # 写入许可证文件（包含所有已知哈希）
          mkdir -p "$ANDROID_HOME/licenses"

          # android-sdk-license（最主要的）
          cat > "$ANDROID_HOME/licenses/android-sdk-license" << 'EOF'

          24333f8a63b6825ea9c5514f83c2829b004d1fee
          8933bad161af4408879e1e66f8f0f

          84831b9409646a918e30573bab4c9c91346d8abd
          d975f751698a77b662f1254ddbeed3901e976f5a
EOF

          # android-sdk-preview-license
          cat > "$ANDROID_HOME/licenses/android-sdk-preview-license" << 'EOF'

          33b6a2b64607f11b759f320ef9dff4ae5c47d97a
          84831b9409646a918e30573bab4c9c91346d8abd
EOF

          # android-googletv-license
          cat > "$ANDROID_HOME/licenses/android-googletv-license" << 'EOF'

          601085b94cd77f0b54ff86406957099ebe79c4d5
          84831b9409646a918e30573bab4c9c91346d8abd
EOF

          # google-gdk-license
          cat > "$ANDROID_HOME/licenses/google-gdk-license" << 'EOF'

          859f317696f67ef3d7f30a50a5560e7834b43903
EOF

          # android-googlexr-license
          cat > "$ANDROID_HOME/licenses/android-googlexr-license" << 'EOF'

          d975f751698a77b662f1254ddbeed3901e976f5a
          e9acab5b5fbb560a72cfaecce8946896ff6aab9d
EOF

          # intel-android-extra-license
          cat > "$ANDROID_HOME/licenses/intel-android-extra-license" << 'EOF'

          d975f751698a77b662f1254ddbeed3901e976f5a
EOF

          # android-sdk-arm-dbt-license
          cat > "$ANDROID_HOME/licenses/android-sdk-arm-dbt-license" << 'EOF'

          859f317696f67ef3d7f30a50a5560e7834b43903
EOF

          echo "License files after writing:"
          ls -la "$ANDROID_HOME/licenses/"
          echo "android-sdk-license content:"
          cat "$ANDROID_HOME/licenses/android-sdk-license"

          # 用 sdkmanager 验证（不安装任何东西，只确认许可证已接受）
          echo "y" | "$SDKMANAGER" --licenses 2>&1 | tail -5 || true

      # 8. 初始化 Capacitor Android 项目
      - name: Init Capacitor Android
        run: |
          npx cap add android || echo "android platform already exists"
          npx cap sync android

      # 9. 给 Gradle 加执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # 10. 打包 Debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      # 11. 上传 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ColorMatch-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
