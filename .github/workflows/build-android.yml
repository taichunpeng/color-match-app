name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. 安装 npm 依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建 Web 产物
      - name: Build web assets
        run: npm run build

      # 5. 设置 JDK 17
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 6. 强制接受所有 Android SDK 许可证（修复 license not accepted 问题）
      - name: Accept Android SDK licenses
        run: |
          ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" || true

      # 7. 初始化 Capacitor Android 项目
      - name: Init Capacitor Android
        run: |
          npx cap add android || echo "android platform already exists"
          npx cap sync android
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      # 8. 给 Gradle 加执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # 9. 打包 Debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # 10. 上传 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ColorMatch-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
