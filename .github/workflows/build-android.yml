name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. 安装 npm 依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建 Web 产物
      - name: Build web assets
        run: npm run build

      # 5. 设置 JDK 17
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 6. 强制写入所有 Android SDK 许可证文件（彻底绕过交互式确认）
      - name: Accept Android SDK licenses (force write)
        run: |
          LICENSES_DIR="${ANDROID_SDK_ROOT}/licenses"
          mkdir -p "$LICENSES_DIR"
          # 写入所有已知许可证的哈希值
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$LICENSES_DIR/android-sdk-license"
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> "$LICENSES_DIR/android-sdk-license"
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> "$LICENSES_DIR/android-sdk-license"
          echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > "$LICENSES_DIR/android-sdk-preview-license"
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > "$LICENSES_DIR/android-googletv-license"
          echo -e "\n601085b94cd77f0b54ff86406957099ebe79c4d5" > "$LICENSES_DIR/android-googletv-license"
          echo -e "\n859f317696f67ef3d7f30a50a5560e7834b43903" > "$LICENSES_DIR/google-gdk-license"
          echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > "$LICENSES_DIR/intel-android-extra-license"
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" > "$LICENSES_DIR/android-googlexr-license"
          echo -e "\ne9acab5b5fbb560a72cfaecce8946896ff6aab9d" > "$LICENSES_DIR/android-googlexr-license"
          echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > "$LICENSES_DIR/mips-android-sysimage-license"
          echo "✓ 许可证文件已写入:"
          ls -la "$LICENSES_DIR"

      # 7. 安装必要的 Android SDK 组件
      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # 8. 初始化 Capacitor Android 项目
      - name: Init Capacitor Android
        run: |
          npx cap add android || echo "android platform already exists"
          npx cap sync android

      # 9. 给 Gradle 加执行权限
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # 10. 打包 Debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # 11. 上传 APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ColorMatch-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
